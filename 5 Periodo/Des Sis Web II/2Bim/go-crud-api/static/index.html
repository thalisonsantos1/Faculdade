<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go CRUD - Front-end</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-sI3mP7k6BvXWg7IqH1aIWn0bWb7N0X9y6wtYtfC8I8L6g+pAKzhH+4u8GiFJxYjN" crossorigin="anonymous" />
    <link rel="stylesheet" href="/static/index.css" />
</head>
<body>
    <nav class="topbar py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <h1 class="h4 text-white mb-0">Gerenciamento de Pessoas</h1>
        </div>
    </nav>

    <main class="hero">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-10">
                    <div class="hero-card p-4 p-md-5 rounded-4 shadow-lg overflow-hidden">
                        <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between mb-4 gap-3">
                            <div>
                                <button id="newUserButton" type="button" class="btn btn-light text-primary fw-bold rounded-pill mb-2 px-4 py-2">Nova pessoa</button>
                                <h2 class="text-white mb-1">Liste e gerencie seus contatos</h2>
                                <p class="text-white-75 mb-0">Use os botões para editar ou excluir cada registro.</p>
                            </div>
                            <div class="w-100 w-md-auto">
                                <div class="input-group bg-white rounded overflow-hidden">
                                    <span class="input-group-text bg-white border-end-0">Buscar</span>
                                    <input id="searchInput" type="search" class="form-control border-start-0" placeholder="Nome, email ou telefone" />
                                </div>
                            </div>
                        </div>

                        <div id="userFormWrapper" class="mb-4 d-none">
                            <div class="user-form-card p-4 rounded-4 border shadow-sm">
                                <form id="userForm">
                                    <input type="hidden" id="userId" value="" />
                                    <div class="row g-3">
                                        <div class="col-12 col-md-6">
                                            <label for="nameInput" class="form-label text-white">Nome</label>
                                            <input id="nameInput" type="text" class="form-control" placeholder="Digite o nome" required />
                                        </div>
                                        <div class="col-12 col-md-6">
                                            <label for="emailInput" class="form-label text-white">Email</label>
                                            <input id="emailInput" type="email" class="form-control" placeholder="Digite o email" required />
                                        </div>
                                        <div class="col-12 col-md-6">
                                            <label for="phoneInput" class="form-label text-white">Telefone</label>
                                            <input id="phoneInput" type="tel" class="form-control" placeholder="(00) 00000-0000" />
                                        </div>
                                    </div>
                                    <div class="mt-4 d-flex flex-wrap gap-2">
                                        <button id="saveButton" type="submit" class="btn btn-primary btn-lg px-4">Salvar</button>
                                        <button id="cancelButton" type="button" class="btn btn-outline-light btn-lg px-4">Cancelar</button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <div class="table-responsive bg-white rounded-4 shadow-sm overflow-hidden">
                            <table class="table mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th scope="col">ID</th>
                                        <th scope="col">Nome</th>
                                        <th scope="col">Telefone</th>
                                        <th scope="col">Email</th>
                                        <th scope="col">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center py-4">Carregando usuários...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div id="statusMessage" class="mt-3 text-white-75 small"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-BYQ/9UPn5+K6Jc5f3z6vJ6QnGCsXf5KGHNvULR2eLQ6Y9WvB8Q9R0pH+2YpBS2z8" crossorigin="anonymous"></script>
    <script src="/static/index.js"></script>
</body>
</html>
