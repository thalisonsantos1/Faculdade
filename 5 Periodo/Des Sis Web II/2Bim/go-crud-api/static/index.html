<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciamento de Pessoas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="/static/index.css" />
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-people-fill"></i> Gerenciamento de Pessoas
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-10">
                <div class="mb-4 d-flex justify-content-between align-items-center flex-column flex-md-row gap-3">
                    <button id="newUserButton" type="button" class="btn btn-primary btn-lg" onclick="novo()">
                        <i class="bi bi-plus-circle"></i> Nova Pessoa
                    </button>
                    <div class="w-100 w-md-auto">
                        <div class="input-group">
                            <span class="input-group-text">Buscar</span>
                            <input id="searchInput" type="search" class="form-control" placeholder="Nome, email ou telefone" />
                        </div>
                    </div>
                </div>

                <div id="conteudo" class="card shadow-sm">
                    <div class="card-body text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Carregando...</span>
                        </div>
                        <p class="mt-2">Carregando pessoas...</p>
                    </div>
                </div>

                <div id="formulario" style="display: none;" class="card shadow-sm mt-4">
                    <div class="card-header bg-primary text-white">
                        <h5 id="formTitle" class="mb-0">Nova Pessoa</h5>
                    </div>
                    <div class="card-body">
                        <form id="userForm">
                            <input type="hidden" id="userId" value="" />
                            <div class="mb-3">
                                <label for="nameInput" class="form-label">Nome:</label>
                                <input type="text" class="form-control" id="nameInput" required />
                            </div>
                            <div class="mb-3">
                                <label for="phoneInput" class="form-label">Telefone:</label>
                                <input type="tel" class="form-control" id="phoneInput" required />
                            </div>
                            <div class="mb-3">
                                <label for="emailInput" class="form-label">Email:</label>
                                <input type="email" class="form-control" id="emailInput" required />
                            </div>
                            <div class="d-flex gap-2 flex-wrap">
                                <button type="button" class="btn btn-success" onclick="salvar()">
                                    <i class="bi bi-check-circle"></i> Salvar
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="cancelar()">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="confirmDeleteLabel">Confirmar Exclusão</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    Tem certeza que deseja deletar <strong id="nomeToDelete"></strong>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" onclick="confirmarDelete()">Deletar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer" class="position-fixed top-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="/static/index.js"></script>
</body>
</html>
