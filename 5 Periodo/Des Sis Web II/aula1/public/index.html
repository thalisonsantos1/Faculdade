<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Pessoas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="index.css"/>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-people-fill"></i> Gerenciamento de Pessoas
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12">
                <!-- Botão para novo registro -->
                <div class="mb-4">
                    <button class="btn btn-primary btn-lg" onclick="novo()">
                        <i class="bi bi-plus-circle"></i> Nova Pessoa
                    </button>
                </div>

                <!-- Tabela de listagem -->
                <div id="conteudo" class="card shadow-sm">
                    <div class="card-body">
                        <p class="text-center text-muted">Aguarde...</p>
                    </div>
                </div>

                <!-- Formulário -->
                <div id="formulario" style="display: none;" class="card shadow-sm mt-4">
                    <div class="card-header bg-primary text-white">
                        <h5 id="formTitle" class="mb-0">Nova Pessoa</h5>
                    </div>
                    <div class="card-body">
                        <form id="formPessoa">
                            <div class="mb-3">
                                <label for="txtnome" class="form-label">Nome:</label>
                                <input type="text" class="form-control" id="txtnome" required>
                            </div>
                            <div class="mb-3">
                                <label for="txttelefone" class="form-label">Telefone:</label>
                                <input type="tel" class="form-control" id="txttelefone" required>
                            </div>
                            <div class="mb-3">
                                <label for="txtemail" class="form-label">Email:</label>
                                <input type="email" class="form-control" id="txtemail" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-success" onclick="salvar()">
                                    <i class="bi bi-check-circle"></i> Salvar
                                </button>
                                <button type="button" class="btn btn-secondary" onclick="cancelar()">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmação de exclusão -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title" id="confirmDeleteLabel">Confirmar Exclusão</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Tem certeza que deseja deletar <strong id="nomeToDelete"></strong>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" onclick="confirmarDelete()">Deletar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Alerta de mensagem -->
    <div id="alertContainer" class="position-fixed top-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
